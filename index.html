<!DOCTYPE html>
<meta charset="UTF-8">
<link rel="stylesheet" href="design.css" type="text/css">

<title>スマートハウスをつくろう</title>
<header>
<h1>自分が暮らすためのスマートハウスをつくろう</h1>
</header>
<p>microbitで、家の電化製品や住宅設備を制御し、自分の生活スタイルにあったスマートハウスをつくります。<br>みなさんが将来、ワンルームで一人暮らしをするとします。その際に、便利で生活しやすい環境を考えましょう。</p>
<form>
    <div>
        <button type="button" id="connect">接続</button>
        制御記録 <textarea id="recieve_text"  cols="40"></textarea>
    </div>
    <section class="house">
        <img src=./figure/間取り.png>
    </section>
    <section class="main">
    <!--室内照明機器の制御-->
    <div class="sample3Area" id="makeImg">
        室内照明
        <input type="checkbox" id="LED-control" onchange="inputChange()" >
          <label for="LED-control">
            <span></span>
          </label>
        <img src=./figure/室内照明.jpg>
    </div>
    <!--ドアの制御-->
    <div class="sample3Area" id="makeImg">
        鍵の開閉
        <input type="checkbox" id="door-control" onchange="inputChange2()">
          <label for="door-control">
            <span></span>
          </label>
        <img src=./figure/ドア.jpg>
    </div>
    <!--テレビの制御-->
    <div class="sample3Area" id="makeImg">
        テレビ
        <input type="checkbox" id="TV-control" onchange="inputChange3()">
          <label for="TV-control">
            <span></span>
          </label>
        <img src=./figure/テレビ.jpg>
    </div>
    <!--その他自分で設定した機器の制御-->
    <div class="sample3Area" id="makeImg">
        <input type="text" id="custom" name="custom"size="9">
        <input type="checkbox" id="custom-control"  onchange="inputChange4()">
          <label for="custom-control">
            <span></span>
          </label>
        <img src=./figure/カスタム.jpg>
    </div>
    <br> <!--改行-->

    <div class="applianceControl">
        <!-- エアコン制御エリア -->
        <div class="sample2Area" id="makeImg">
            エアコン
            <input type="checkbox" id="air-control">
            <label for="air-control">
                <span></span>
            </label>
            <img src="./figure/エアコン.jpg">
        </div>
        <div class="sample4Area" id="makeImg">
            <input type="radio" name="air-power" value="reset">切 <br>
            <input type="radio" name="air-power" value="weak">弱 <br>
            <input type="radio" name="air-power" value="strong">強
        </div>
    
        <!-- ペットカメラ制御エリア -->
        <div class="cameraControlArea">
            ペットカメラ
            <input type="checkbox" id="camera-control">
            <label for="camera-control">
                <span></span>
            </label>
            <textarea id="camera_move"></textarea>
            <img src="./figure/ペットカメラ.jpg">
        </div>
    </div>
    

</section>

</form>

<script>
// micro:bit UART Service
const UUID_UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e'

// このHTMLでは、元の動作していたバージョンに合わせて
// 6e400002 を通知受信用、6e400003 を書込送信用として扱います。
const UUID_TX_CHAR_CHARACTERISTIC = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
const UUID_RX_CHAR_CHARACTERISTIC = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'

let gatt = null
let tx = null
let rx = null
let log = ""

const KNOWN_MESSAGES = [
    'REQUEST-CUSTOM-STATE',
    'REQUEST-CAMERA-STATE',
    'REQUEST-DOOR-STATE',
    'REQUEST-LED-STATE',
    'REQUEST-TV-STATE',
    'REQUEST-AIR-STATE',
    'cold-strong',
    'heat-strong',
    'custom-OFF',
    'custom-ON',
    'camera-OFF',
    'camera-ON',
    'camera-low',
    'camera-c',
    'camera-r',
    'camera-l',
    'heat-weak',
    'cold-weak',
    'LED-OFF',
    'LED-ON',
    'door-OFF',
    'door-ON',
    'TV-OFF',
    'TV-ON',
    'air-OFF',
    'music-OFF',
    'music-ON',
    'window-OFF',
    'window-ON'
]

const update = connected => {
    document.getElementById('connect').textContent = connected ? '切断' : '接続'
}

function addLog(message) {
    log = message + "\r\n" + log
    document.getElementById('recieve_text').value = log
}

function checked(id, value) {
    const el = document.getElementById(id)
    if (el) el.checked = value
}

function setRadioValue(name, value) {
    const target = document.querySelector(`input[name="${name}"][value="${value}"]`)
    if (target) target.checked = true
}

async function send(text) {
    if (!rx) {
        addLog('未接続のため送信できません: ' + text)
        return
    }
    const data = new TextEncoder().encode(text + '\n')
    try {
        if (rx.writeValueWithoutResponse) {
            await rx.writeValueWithoutResponse(data)
        } else {
            await rx.writeValue(data)
        }
        //addLog('送信: ' + text)
    } catch (err) {
        //('送信失敗: ' + text + ' / ' + err)
    }
}


function currentAirMessage() {
    const airControl = document.getElementById('air-control')
    const selected = document.querySelector('input[name="air-power"]:checked')
    const selectedValue = selected ? selected.value : 'reset'

    if (selectedValue === 'reset') return 'air-OFF'

    if (airControl && airControl.checked) {
        if (selectedValue === 'weak') return 'heat-weak'
        if (selectedValue === 'strong') return 'heat-strong'
    } else {
        if (selectedValue === 'weak') return 'cold-weak'
        if (selectedValue === 'strong') return 'cold-strong'
    }
    return 'air-OFF'
}

function respondState(request) {
    if (request === 'REQUEST-LED-STATE') {
        send(document.getElementById('LED-control').checked ? 'LED-ON' : 'LED-OFF')
    } else if (request === 'REQUEST-DOOR-STATE') {
        send(document.getElementById('door-control').checked ? 'door-ON' : 'door-OFF')
    } else if (request === 'REQUEST-TV-STATE') {
        send(document.getElementById('TV-control').checked ? 'TV-ON' : 'TV-OFF')
    } else if (request === 'REQUEST-CUSTOM-STATE') {
        send(document.getElementById('custom-control').checked ? 'custom-ON' : 'custom-OFF')
    } else if (request === 'REQUEST-CAMERA-STATE') {
        const camera = document.getElementById('camera-control')
        send(camera && camera.checked ? 'camera-ON' : 'camera-OFF')
    } else if (request === 'REQUEST-AIR-STATE') {
        send(currentAirMessage())
    }
}

function applyMessage(message, fromMicrobit = true) {
    const text = message.trim()
    if (!text) return

    switch (text) {
        case 'LED-ON':
            checked('LED-control', true)
            addLog('室内照明をONにしました')
            break
        case 'LED-OFF':
            checked('LED-control', false)
            addLog('室内照明をOFFにしました')
            break

        case 'door-ON':
            checked('door-control', true)
            addLog('ドアの鍵を開けました')
            break
        case 'door-OFF':
            checked('door-control', false)
            addLog('ドアの鍵を閉じました')
            break

        case 'TV-ON':
            checked('TV-control', true)
            addLog('テレビをONにしました')
            break
        case 'TV-OFF':
            checked('TV-control', false)
            addLog('テレビをOFFにしました')
            break

        case 'custom-ON':
            checked('custom-control', true)
            addLog((document.getElementById('custom').value || 'カスタム機器') + 'をONにしました')
            break
        case 'custom-OFF':
            checked('custom-control', false)
            addLog((document.getElementById('custom').value || 'カスタム機器') + 'をOFFにしました')
            break

        case 'air-OFF':
            setRadioValue('air-power', 'reset')
            addLog('エアコンをOFFにしました')
            break
        case 'heat-weak':
            checked('air-control', true)
            setRadioValue('air-power', 'weak')
            addLog('暖房を弱にしました')
            break
        case 'heat-strong':
            checked('air-control', true)
            setRadioValue('air-power', 'strong')
            addLog('暖房を強にしました')
            break
        case 'cold-weak':
            checked('air-control', false)
            setRadioValue('air-power', 'weak')
            addLog('冷房を弱にしました')
            break
        case 'cold-strong':
            checked('air-control', false)
            setRadioValue('air-power', 'strong')
            addLog('冷房を強にしました')
            break

        case 'window-ON':
            checked('window-control', true)
            addLog('窓を開きました')
            break
        case 'window-OFF':
            checked('window-control', false)
            addLog('窓を閉じました')
            break

        case 'music-ON':
            checked('music-control', true)
            addLog('音楽を流しました')
            break
        case 'music-OFF':
            checked('music-control', false)
            addLog('音楽を止めました')
            break

        case 'camera-ON':
            checked('camera-control', true)
            addLog('カメラをONにしました')
            break
        case 'camera-OFF':
            checked('camera-control', false)
            addLog('カメラをOFFにしました')
            break
        case 'camera-c':
            if (document.getElementById('camera_move')) document.getElementById('camera_move').value = '中央方向'
            addLog('カメラの向きを中央にしました')
            break
        case 'camera-low':
            if (document.getElementById('camera_move')) document.getElementById('camera_move').value = '下方向'
            addLog('カメラの向きを下にしました')
            break
        case 'camera-r':
            if (document.getElementById('camera_move')) document.getElementById('camera_move').value = '右方向'
            addLog('カメラの向きを右にしました')
            break
        case 'camera-l':
            if (document.getElementById('camera_move')) document.getElementById('camera_move').value = '左方向'
            addLog('カメラの向きを左にしました')
            break

        case 'REQUEST-LED-STATE':
        case 'REQUEST-DOOR-STATE':
        case 'REQUEST-TV-STATE':
        case 'REQUEST-AIR-STATE':
        case 'REQUEST-CAMERA-STATE':
        case 'REQUEST-CUSTOM-STATE':
            respondState(text)
            break

        default:
            addLog('未対応の受信: ' + text)
    }
}

function parseIncoming(rawText) {
    const normalized = rawText.replace(/\r/g, '\n')
    const parts = normalized.split('\n').map(s => s.trim()).filter(Boolean)

    if (parts.length > 1) return parts
    const single = parts[0] || rawText.trim()
    if (!single) return []
    if (KNOWN_MESSAGES.indexOf(single) >= 0) return [single]

    // まれに複数の文字列が連結して届いた場合の簡易分解
    let rest = single
    const result = []
    while (rest.length > 0) {
        let found = ''
        for (const m of KNOWN_MESSAGES) {
            if (rest.startsWith(m) && m.length > found.length) found = m
        }
        if (!found) {
            result.push(rest)
            break
        }
        result.push(found)
        rest = rest.slice(found.length)
    }
    return result
}

document.getElementById('connect').addEventListener('click', e => {
    if (!(navigator.bluetooth && navigator.bluetooth.requestDevice)) {
        alert('WebBluetooth に未対応のブラウザです。')
        return
    }

    if (document.getElementById('connect').textContent == '接続') {
        navigator.bluetooth.requestDevice({
            filters: [
                { services: [UUID_UART_SERVICE] },
                { namePrefix: 'BBC micro:bit' }
            ]
        }).then(device => {
            gatt = device.gatt
            device.addEventListener('gattserverdisconnected', () => {
                gatt = null
                tx = null
                rx = null
                update(false)
                addLog('micro:bitとの接続が切れました')
            })
            return gatt.connect()
        }).then(server =>
            server.getPrimaryService(UUID_UART_SERVICE)
        ).then(service =>
            Promise.all([
                service.getCharacteristic(UUID_TX_CHAR_CHARACTERISTIC),
                service.getCharacteristic(UUID_RX_CHAR_CHARACTERISTIC)
            ])
        ).then(characteristics => {
            tx = characteristics[0]
            rx = characteristics[1]

            tx.startNotifications()
            tx.addEventListener('characteristicvaluechanged', e => {
                const raw = new TextDecoder().decode(e.target.value)
                parseIncoming(raw).forEach(msg => applyMessage(msg, true))
            })

            update(true)
            addLog('接続しました')
        }).catch(function (err) {
            alert(err)
        })
    } else {
        if (gatt) gatt.disconnect()
        gatt = null
        tx = null
        rx = null
        update(false)
    }
})

// 室内照明をWebボタンで変化させた時の処理
function inputChange() {
    const checkbox = document.getElementById('LED-control')
    send(checkbox.checked ? 'LED-ON' : 'LED-OFF')
}

// ドアの鍵をWebボタンで変化させた時の処理
function inputChange2() {
    const checkbox = document.getElementById('door-control')
    send(checkbox.checked ? 'door-ON' : 'door-OFF')
}

// TVをWebボタンで変化させた時の処理
function inputChange3() {
    const checkbox = document.getElementById('TV-control')
    send(checkbox.checked ? 'TV-ON' : 'TV-OFF')
}

// カスタムをWebボタンで変化させた時の処理
function inputChange4() {
    const checkbox = document.getElementById('custom-control')
    send(checkbox.checked ? 'custom-ON' : 'custom-OFF')
}

// エアコンの設定が変更されたとき
const airControl = document.getElementById('air-control')
if (airControl) {
    airControl.addEventListener('change', function () {
        const selected = document.querySelector('input[name="air-power"]:checked')
        if (selected) send(currentAirMessage())
    })
}

document.querySelectorAll("input[name='air-power']").forEach(function (element) {
    element.addEventListener('change', function () {
        send(currentAirMessage())
    })
})
</script>
